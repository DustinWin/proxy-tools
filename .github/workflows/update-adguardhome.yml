name: Update AdGuard Home
on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".github/workflows/delete-old-workflows.yml"
      - ".github/workflows/update-dashboard.yml"
      - ".github/workflows/update-mihomo.yml"
      - ".github/workflows/update-singbox.yml"

jobs:
  go:
    runs-on: ubuntu-latest
    outputs:
      go_version: ${{ steps.go.outputs.version }}
    steps:
      - name: Get `Go` latest version
        id: go
        run: |
          echo "version=$(curl -sSL https://raw.githubusercontent.com/actions/go-versions/update-versions-manifest-file/versions-manifest.json | jq -r '.[0].version')" >> $GITHUB_OUTPUT

  node:
    runs-on: ubuntu-latest
    outputs:
      node_version: ${{ steps.node.outputs.version }}
    steps:
      - name: Get `Node` latest version (LTS)
        id: node
        run: |
          echo "version=$(curl -sSL https://nodejs.org/dist/index.json | jq -r 'map(select(.lts)) | .[0].version[1:]')" >> $GITHUB_OUTPUT

  release:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release.outputs.release_version }}
      release_time: ${{ steps.release.outputs.release_time }}
      release_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Get `AdGuard Home Release` version and time
        id: release
        run: |
          echo "release_version=$(curl -sSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r '.tag_name')" >> $GITHUB_OUTPUT
          echo "release_time=$(curl -sSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r '.created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Compare `AdGuard Home Release` versions with current release
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/AdGuardHome" | jq -r '.body // ""')
          if echo "$current_body" | grep -q "${{ steps.release.outputs.release_version }}.*${{ steps.release.outputs.release_time }}"; then
            echo "AdGuard Home Release 版本一致，跳过更新"
            skip_update=true
          else
            echo "AdGuard Home Release 版本不同，需要更新"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> $GITHUB_OUTPUT

  release_cross:
    runs-on: ubuntu-latest
    if: needs.release.outputs.release_skip_update != 'true'
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux_amd64, goos: linux, goarch: amd64, goamd64: v1 }
          - { name: linux_armv5, goos: linux, goarch: arm, goarm: 5 }
          - { name: linux_armv6, goos: linux, goarch: arm, goarm: 6 }
          - { name: linux_armv7, goos: linux, goarch: arm, goarm: 7 }
          - { name: linux_arm64, goos: linux, goarch: arm64 }
          - { name: linux_mips_softfloat, goos: linux, goarch: mips, gomips: softfloat }
          - { name: linux_mipsle_softfloat, goos: linux, goarch: mipsle, gomips: softfloat }
          # Windows
          - { name: windows_amd64, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows_arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - node
      - release
    env:
      release_VERSION: ${{ needs.release.outputs.release_version }}
    steps:
      - name: Checkout `AdguardTeam/AdGuardHome`
        uses: actions/checkout@v5
        with:
          repository: AdguardTeam/AdGuardHome

      - name: Setup `Go`
        uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Adapt `Go` version
        run: |
          go get go@${{ needs.go.outputs.go_version }}
          go mod tidy

      - name: Setup `Node`
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.node.outputs.node_version }}

      - name: Setup `Snapcraft`
        run: |
          sudo snap install snapcraft --classic

      - name: Build `AdGuard Home Release`
        id: build
        run: |
          make SIGN=0 VERBOSE=1 ARCH=${{ matrix.goarch }} OS=${{ matrix.goos }} CHANNEL=release VERSION=${{ env.release_VERSION }} GOTOOLCHAIN=local build-release

      - name: Upload files to workspace
        uses: actions/upload-artifact@v4
        with:
          name: AdGuardHome_release_${{ matrix.name }}
          path: '**/AdGuardHome/AdGuardHome*'

  beta:
    runs-on: ubuntu-latest
    outputs:
      beta_version: ${{ steps.beta.outputs.beta_version }}
      beta_time: ${{ steps.beta.outputs.beta_time }}
      beta_skip_update: ${{ steps.compare.outputs.skip_update }}
    steps:
      - name: Get `AdGuard Home Beta` version and time
        id: beta
        run: |
          echo "beta_version=$(curl -sSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases | jq -r '[.[] | select(.tag_name | contains("b"))][0].tag_name')" >> $GITHUB_OUTPUT
          echo "beta_time=$(curl -sSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases | jq -r '[.[] | select(.tag_name | contains("b"))][0].created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Compare `AdGuard Home Beta` versions with current beta
        id: compare
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/AdGuardHome" | jq -r '.body // ""')
          if echo "$current_body" | grep -q "${{ steps.beta.outputs.beta_version }}.*${{ steps.beta.outputs.beta_time }}"; then
            echo "AdGuard Home Beta 版本一致，跳过更新"
            skip_update=true
          else
            echo "AdGuard Home Beta 版本不同，需要更新"
            skip_update=false
          fi
          echo "skip_update=$skip_update" >> $GITHUB_OUTPUT

  beta_cross:
    runs-on: ubuntu-latest
    if: needs.beta.outputs.beta_skip_update != 'true'
    strategy:
      matrix:
        include:
          # Linux
          - { name: linux_amd64, goos: linux, goarch: amd64, goamd64: v1 }
          - { name: linux_armv5, goos: linux, goarch: arm, goarm: 5 }
          - { name: linux_armv6, goos: linux, goarch: arm, goarm: 6 }
          - { name: linux_armv7, goos: linux, goarch: arm, goarm: 7 }
          - { name: linux_arm64, goos: linux, goarch: arm64 }
          - { name: linux_mips_softfloat, goos: linux, goarch: mips, gomips: softfloat }
          - { name: linux_mipsle_softfloat, goos: linux, goarch: mipsle, gomips: softfloat }
          # Windows
          - { name: windows_amd64, goos: windows, goarch: amd64, goamd64: v1 }
          - { name: windows_arm64, goos: windows, goarch: arm64 }

      fail-fast: false
    needs:
      - go
      - node
      - beta
    env:
      beta_VERSION: ${{ needs.beta.outputs.beta_version }}
    steps:
      - name: Checkout `AdguardTeam/AdGuardHome`
        uses: actions/checkout@v5
        with:
          repository: AdguardTeam/AdGuardHome

      - name: Setup `Go`
        uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.go.outputs.go_version }}

      - name: Adapt `Go` version
        run: |
          go get go@${{ needs.go.outputs.go_version }}
          go mod tidy

      - name: Setup `Node`
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.node.outputs.node_version }}

      - name: Setup `Snapcraft`
        run: |
          sudo snap install snapcraft --classic

      - name: Build `AdGuard Home Beta`
        id: build
        run: |
          make SIGN=0 VERBOSE=1 ARCH=${{ matrix.goarch }} OS=${{ matrix.goos }} CHANNEL=beta VERSION=${{ env.beta_VERSION }} GOTOOLCHAIN=local build-release

      - name: Upload files to workspace
        uses: actions/upload-artifact@v4
        with:
          name: AdGuardHome_beta_${{ matrix.name }}
          path: '**/AdGuardHome/AdGuardHome*'

  push_adguardhome:
    runs-on: ubuntu-latest
    if: always() && (needs.release.outputs.release_skip_update != 'true' || needs.beta.outputs.beta_skip_update != 'true')
    needs:
      - release
      - release_cross
      - beta
      - beta_cross
    env:
      release_VERSION: ${{ needs.release.outputs.release_version }}
      release_TIME: ${{ needs.release.outputs.release_time }}
      beta_VERSION: ${{ needs.beta.outputs.beta_version }}
      beta_TIME: ${{ needs.beta.outputs.beta_time }}
    steps:
      - name: Clone Repository
        uses: actions/checkout@v5

      - name: Download files from workspace
        uses: actions/download-artifact@v5
        with:
          path: ./tmp-adguardhome/

      - name: Ready for compress `AdGuard Home Release` files
        if: needs.release.outputs.release_skip_update != 'true'
        run: |
          mkdir -p ./tmp-adguardhome/compress/
          old_name=(amd64 armv5 armv6 armv7 arm64 mips_softfloat mipsle_softfloat)
          new_name=(amd64 armv5 armv6 armv7 armv8 mips_softfloat mipsle_softfloat)
          for i in "${!old_name[@]}"; do
            mv -f "./tmp-adguardhome/AdGuardHome_release_linux_${old_name[i]}/dist/AdGuardHome_linux_${old_name[i]//v/_}/AdGuardHome/AdGuardHome" "./tmp-adguardhome/compress/AdGuardHome_release_linux_${new_name[i]}"
          done
          chmod +x ./tmp-adguardhome/compress/AdGuardHome_release_linux*

      - name: Setup `upx` and compress `AdGuard Home Release` files
        if: needs.release.outputs.release_skip_update != 'true'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: ./tmp-adguardhome/compress/AdGuardHome_release_linux*

      - name: Move `AdGuard Home Release` files
        if: needs.release.outputs.release_skip_update != 'true'
        run: |
          mkdir -p ./AdGuardHome/
          mv -f ./tmp-adguardhome/compress/AdGuardHome_release_linux* ./AdGuardHome/
          mv -f ./tmp-adguardhome/AdGuardHome_release_windows_amd64/dist/AdGuardHome_windows_amd64/AdGuardHome/AdGuardHome.exe ./AdGuardHome/AdGuardHome_release_windows_amd64.exe
          mv -f ./tmp-adguardhome/AdGuardHome_release_windows_arm64/dist/AdGuardHome_windows_arm64/AdGuardHome/AdGuardHome.exe ./AdGuardHome/AdGuardHome_release_windows_arm64.exe

      - name: Ready for compress `AdGuard Home Beta` files
        if: needs.beta.outputs.beta_skip_update != 'true'
        run: |
          mkdir -p ./tmp-adguardhome/compress/
          old_name=(amd64 armv5 armv6 armv7 arm64 mips_softfloat mipsle_softfloat)
          new_name=(amd64 armv5 armv6 armv7 armv8 mips_softfloat mipsle_softfloat)
          for i in "${!old_name[@]}"; do
            mv -f "./tmp-adguardhome/AdGuardHome_beta_linux_${old_name[i]}/dist/AdGuardHome_linux_${old_name[i]//v/_}/AdGuardHome/AdGuardHome" "./tmp-adguardhome/compress/AdGuardHome_beta_linux_${new_name[i]}"
          done
          chmod +x ./tmp-adguardhome/compress/AdGuardHome_beta_linux*

      - name: Setup `upx` and compress `AdGuard Home Beta` files
        if: needs.beta.outputs.beta_skip_update != 'true'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: ./tmp-adguardhome/compress/AdGuardHome_beta_linux*

      - name: Move `AdGuard Home Beta` files
        if: needs.beta.outputs.beta_skip_update != 'true'
        run: |
          mkdir -p ./AdGuardHome/
          mv -f ./tmp-adguardhome/compress/AdGuardHome_beta_linux* ./AdGuardHome/
          mv -f ./tmp-adguardhome/AdGuardHome_beta_windows_amd64/dist/AdGuardHome_windows_amd64/AdGuardHome/AdGuardHome.exe ./AdGuardHome/AdGuardHome_beta_windows_amd64.exe
          mv -f ./tmp-adguardhome/AdGuardHome_beta_windows_arm64/dist/AdGuardHome_windows_arm64/AdGuardHome/AdGuardHome.exe ./AdGuardHome/AdGuardHome_beta_windows_arm64.exe

      - name: Check if `AdGuardHome` files exist
        id: check
        run: |
          if ls ./AdGuardHome/* >/dev/null 2>&1; then
            echo "adguardhome_exist=true" >> $GITHUB_OUTPUT
          else
            echo "adguardhome_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Release and upload `AdGuardHome` assets
        if: ${{ steps.check.outputs.adguardhome_exist == 'true' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: AdGuardHome
          tag: AdGuardHome
          overwrite: true
          body: |
            更新 [AdGuard Home Release 版](https://github.com/AdguardTeam/AdGuardHome/tree/beta-v0.107)至 ${{ env.release_VERSION }}，发布于 ${{ env.release_TIME }}
            更新 [AdGuard Home Beta 版](https://github.com/AdguardTeam/AdGuardHome/tree/beta-v0.108)至 ${{ env.beta_VERSION }}，发布于 ${{ env.beta_TIME }}
          file_glob: true
          file: ./AdGuardHome/*
