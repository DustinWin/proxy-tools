name: Update AdGuard Home
on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".github/workflows/delete-old-workflows.yml"
      - ".github/workflows/update-dashboard.yml"
      - ".github/workflows/update-mihomo.yml"
      - ".github/workflows/update-singbox.yml"

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v5

      - name: Set variables
        run: |
          echo "download_url=https://github.com/AdguardTeam/AdGuardHome/releases/download" >> ${GITHUB_ENV}
          echo "release_version=$(curl -sSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r '.tag_name')" >> ${GITHUB_ENV}
          echo "release_time=$(curl -sSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest | jq -r '.created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> ${GITHUB_ENV}
          echo "beta_version=$(curl -sSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases | jq -r '[.[] | select(.tag_name | contains("b"))][0].tag_name')" >> ${GITHUB_ENV}
          echo "beta_time=$(curl -sSL https://api.github.com/repos/AdguardTeam/AdGuardHome/releases | jq -r '[.[] | select(.tag_name | contains("b"))][0].created_at' | xargs -I {} date -d '{} +8 hours' '+%Y-%m-%d')" >> ${GITHUB_ENV}
        shell: bash

      - name: Compare `AdGuard Home Release` versions with current release
        run: |
          current_body=$(curl -sSL "https://api.github.com/repos/${{ github.repository }}/releases/tags/AdGuardHome" | jq -r '.body // ""')
          archs=(
            "AdGuard Home Release|${release_version}|${release_time}"
            "AdGuard Home Beta|${beta_version}|${beta_time}"
          )
          for arch in "${archs[@]}"; do
            IFS="|" read -r name version time <<< "$arch"
            var_name="${name// /_}_skip_update"
            if echo "${current_body}" | grep -q "${name}.*${version}.*${time}"; then
              echo "${name} 版本一致，跳过更新"
              eval "${var_name}=true"
            else
              echo "${name} 版本不同，需要更新"
              eval "${var_name}=false"
            fi
            eval "value=\$${var_name}"
            echo "${var_name}=${value}" >> ${GITHUB_ENV}
          done

      - name: Download `AdGuard Home Release` files
        if: env.AdGuard_Home_Release_skip_update != 'true'
        run: |
          # Linux
          mkdir -p ./AdGuardHome/
          old_name=(amd64 armv5 armv6 armv7 arm64 mips_softfloat mipsle_softfloat)
          new_name=(amd64 armv5 armv6 armv7 armv8 mips_softfloat mipsle_softfloat)
          for i in "${!old_name[@]}"; do
            mkdir -p "./tmp/release_linux_${old_name[i]}"
            curl -L "${download_url}/${release_version}/AdGuardHome_linux_${old_name[i]}.tar.gz" | tar -zx -C "./tmp/release_linux_${old_name[i]}"
            mv -f "./tmp/release_linux_${old_name[i]}/AdGuardHome/AdGuardHome" "./AdGuardHome/AdGuardHome_release_linux_${new_name[i]}"
          done
          chmod +x ./AdGuardHome/AdGuardHome_release_linux_*

          # Windows
          mkdir -p ./tmp/release_windows_amd64/ ./tmp/release_windows_arm64/
          wget -P ./tmp/release_windows_amd64/ "${download_url}/${release_version}/AdGuardHome_windows_amd64.zip"
          unzip -o ./tmp/release_windows_amd64/AdGuardHome_windows_amd64.zip -d ./tmp/release_windows_amd64/
          mv -f ./tmp/release_windows_amd64/AdGuardHome/AdGuardHome.exe ./AdGuardHome/AdGuardHome_release_windows_amd64.exe
          wget -P ./tmp/release_windows_arm64/ "${download_url}/${release_version}/AdGuardHome_windows_arm64.zip"
          unzip -o ./tmp/release_windows_arm64/AdGuardHome_windows_arm64.zip -d ./tmp/release_windows_arm64/
          mv -f ./tmp/release_windows_arm64/AdGuardHome/AdGuardHome.exe ./AdGuardHome/AdGuardHome_release_windows_arm64.exe

      - name: Setup `upx` and compress `AdGuard Home Release` files
        if: env.AdGuard_Home_Release_skip_update != 'true'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: ./AdGuardHome/AdGuardHome_release_linux*

      - name: Download `AdGuard Home Beta` files
        if: env.AdGuard_Home_Beta_skip_update != 'true'
        run: |
          # Linux
          mkdir -p ./AdGuardHome/
          old_name=(amd64 armv5 armv6 armv7 arm64 mips_softfloat mipsle_softfloat)
          new_name=(amd64 armv5 armv6 armv7 armv8 mips_softfloat mipsle_softfloat)
          for i in "${!old_name[@]}"; do
            mkdir -p "./tmp/beta_linux_${old_name[i]}"
            curl -L "${download_url}/${beta_version}/AdGuardHome_linux_${old_name[i]}.tar.gz" | tar -zx -C "./tmp/beta_linux_${old_name[i]}"
            mv -f "./tmp/beta_linux_${old_name[i]}/AdGuardHome/AdGuardHome" "./AdGuardHome/AdGuardHome_beta_linux_${new_name[i]}"
          done
          chmod +x ./AdGuardHome/AdGuardHome_beta_linux_*

          # Windows
          mkdir -p ./tmp/beta_windows_amd64/ ./tmp/beta_windows_arm64/
          wget -P ./tmp/beta_windows_amd64/ "${download_url}/${beta_version}/AdGuardHome_windows_amd64.zip"
          unzip -o ./tmp/beta_windows_amd64/AdGuardHome_windows_amd64.zip -d ./tmp/beta_windows_amd64/
          mv -f ./tmp/beta_windows_amd64/AdGuardHome/AdGuardHome.exe ./AdGuardHome/AdGuardHome_beta_windows_amd64.exe
          wget -P ./tmp/beta_windows_arm64/ "${download_url}/${beta_version}/AdGuardHome_windows_arm64.zip"
          unzip -o ./tmp/beta_windows_arm64/AdGuardHome_windows_arm64.zip -d ./tmp/beta_windows_arm64/
          mv -f ./tmp/beta_windows_arm64/AdGuardHome/AdGuardHome.exe ./AdGuardHome/AdGuardHome_beta_windows_arm64.exe

      - name: Setup `upx` and compress `AdGuard Home Beta` files
        if: env.AdGuard_Home_Beta_skip_update != 'true'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: ./AdGuardHome/AdGuardHome_beta_linux*

      - name: Check if `AdGuardHome` files exist
        id: check
        run: |
          if ls ./AdGuardHome/* >/dev/null 2>&1; then
            echo "adguardhome_exist=true" >> ${GITHUB_ENV}
          else
            echo "adguardhome_exist=false" >> ${GITHUB_ENV}
          fi

      - name: Release and upload `AdGuardHome` assets
        if: env.adguardhome_exist == 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: AdGuardHome
          tag: AdGuardHome
          overwrite: true
          body: |
            更新 [AdGuard Home Release 版](https://github.com/AdguardTeam/AdGuardHome/tree/beta-v0.107)至 ${{ env.release_VERSION }}，发布于 ${{ env.release_TIME }}
            更新 [AdGuard Home Beta 版](https://github.com/AdguardTeam/AdGuardHome/tree/beta-v0.108)至 ${{ env.beta_VERSION }}，发布于 ${{ env.beta_TIME }}
          file_glob: true
          file: ./AdGuardHome/*
